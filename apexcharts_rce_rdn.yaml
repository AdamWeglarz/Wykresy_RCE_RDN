- type: custom:apexcharts-card
  graph_span: 24h
  span:
    start: day
  update_interval: 15min
  experimental:
    color_threshold: true
  header:
    show: true
    title: Ceny energii (PLN/MWh)
    show_states: true
    colorize_states: true
  series:
    - entity: sensor.rce_prices_today
      name: Cena energii (dzis)
      show:
        in_header: true
        in_chart: false
      stroke_width: 0
    - entity: sensor.rce_prices_today
      attribute: value
      name: Cena energii (dzis)
      data_generator: |
        return (entity.attributes.value || []).map(item => {
          const dateStr = item.dtime.replace(" ", "T");
          const timestamp = new Date(dateStr).getTime();
          return [timestamp - 900000, Number(item.rce_pln)];
        });
      type: line
      curve: stepline
      stroke_width: 4
      extend_to: false
      color_threshold:
        - value: 0
          color: red
        - value: 300
          color: orange
        - value: 500
          color: yellow
        - value: 700
          color: green
      show:
        in_header: false
        in_chart: true
        legend_value: false
  now:
    show: true
    label: Teraz
    color: red
  apex_config:
    chart:
      parentHeightOffset: 0
    grid:
      padding:
        top: 12
    legend:
      show: false

