- type: custom:apexcharts-card
  graph_span: 24h
  span:
    start: day
    offset: +1d
  update_interval: 15min
  experimental:
    color_threshold: true
  header:
    show: true
    title: Ceny energii jutro (PLN/MWh)
    show_states: true
    colorize_states: true
  series:
    - entity: sensor.rce_prices_tomorrow
      attribute: value
      name: Cena energii jutro
      data_generator: |
        const h = new Date().getHours();
        const prices = entity.attributes.value || [];
        const item = prices.find(p => new Date(p.dtime.replace(' ', 'T')).getHours() === h);
        return item ? [[new Date().getTime(), Number(item.rce_pln)]] : [];
      color_threshold:
        - value: 0
          color: red
        - value: 300
          color: orange
        - value: 500
          color: yellow
        - value: 700
          color: green
      show:
        in_header: true
        in_chart: false
        legend_value: false
    - entity: sensor.rce_prices_tomorrow
      attribute: value
      name: Cena energii jutro
      data_generator: |
        return entity.attributes.value.map(item => {
          return [new Date(item.dtime.replace(" ", "T")).getTime(), item.rce_pln];
        });
      type: line
      curve: stepline
      stroke_width: 4
      extend_to: false
      color_threshold:
        - value: 0
          color: red
        - value: 300
          color: orange
        - value: 500
          color: yellow
        - value: 700
          color: green
      show:
        in_header: false
        in_chart: true
        legend_value: false
  apex_config:
    grid:
      padding:
        top: 20
    chart:
      parentHeightOffset: 0
    legend:
      show: false
    annotations:
      xaxis:
        - x: |
            EVAL:(() => {
              const t = new Date();
              t.setDate(t.getDate() + 1);
              t.setMinutes(0, 0, 0);
              return t.getTime();
            })()
          strokeDashArray: 5
          borderColor: red
          borderWidth: 2
          label:
            text: Teraz
            borderColor: red
            style:
              color: white
              background: red

